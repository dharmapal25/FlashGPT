<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f19" />
    <title>FlashGPT Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d0f13;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 26px;
      }

      p {
        margin: 0;
        color: #aab4c5;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/FLASHGPT_ICON.png" alt="FlashGPT" />
      <h1>You are offline</h1>
      <p>FlashGPT can open offline, but chat, login, and memory need an internet connection.</p>
    </main>
  </body>
</html>
